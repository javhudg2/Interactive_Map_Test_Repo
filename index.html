<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Custom Dashboard Filter Search</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.28/"></script>

    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        #searchDiv {
            width: 100%;
            padding: 2px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        /* This hides the default ArcGIS dropdown suggestions entirely */
        .esri-search__suggestions-menu {
            display: none !important;
        }
        .esri-search {
            width: 100%;
            box-shadow: none;
            border: 1px solid #ccc;
        }
        #listContainer {
            margin-top: 5px;
            width: 100%;
        }
        .list-item {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
            color: #323232;
            transition: background 0.2s;
        }
        .list-item:hover {
            background-color: #f3f3f3;
            color: #005e95;
        }
    </style>
</head>
<body>
    <div id="searchDiv"></div>
    <div id="listContainer"></div>

    <script>
        require([
            "esri/widgets/Search",
            "esri/layers/FeatureLayer"
        ], (Search, FeatureLayer) => {

            const privateLayer = new FeatureLayer({
                portalItem: {
                    id: "a215e921fa0d4b3f88c40210c0a9eee7"
                }
            });

            const searchWidget = new Search({
                container: "searchDiv",
                includeDefaultSources: false,
                popupEnabled: false,
                resultGraphicEnabled: false,
                suggestionsEnabled: false, // Disables the dropdown menu
                autoSelect: false,          // Prevents automatic selection/zooming
                sources: [{
                    layer: privateLayer,
                    searchFields: ["Name", "Building_T", "Official_Long", "Abbrev_Short"],
                    displayField: "Name",
                    exactMatch: false,
                    outFields: ["*"],
                    name: "Internal Assets",
                    placeholder: "Type to filter list..."
                }]
            });

            // Reusable filtering function
            const filterTheList = (value) => {
                const filterText = (value || "").toLowerCase();
                const listItems = document.querySelectorAll(".list-item");

                listItems.forEach((item) => {
                    const text = item.innerText.toLowerCase();
                    item.style.display = text.includes(filterText) ? "block" : "none";
                });
            };

            const buildList = () => {
                const query = privateLayer.createQuery();
                query.outFields = ["Name", "objectid"];
                query.where = "1=1";

                privateLayer.queryFeatures(query).then((results) => {
                    const container = document.getElementById("listContainer");
                    container.innerHTML = ""; // Clear existing
                    
                    const sortedFeatures = results.features.sort((a, b) => {
                        const nameA = (a.attributes.Name || "").toUpperCase();
                        const nameB = (b.attributes.Name || "").toUpperCase();
                        return nameA.localeCompare(nameB);
                    });

                    sortedFeatures.forEach((feature) => {
                        const attr = feature.attributes;
                        const item = document.createElement("div");
                        item.className = "list-item";
                        item.innerText = attr.Name || "Unnamed Asset";

                        item.onclick = () => {
                            const searchID = attr.objectid;
                            const parentUrl = new URL(window.parent.location.href);
                            parentUrl.searchParams.set('asset', searchID);
                            window.parent.location.replace(parentUrl.href);
                        };
                        container.appendChild(item);
                    });
                });
            };

            // 1. Listen for typing (Live Filter)
            searchWidget.on("value-change", (event) => {
                filterTheList(event.value);
            });

            // 2. Listen for "Enter" or "Search Button" click
            searchWidget.on("search-complete", () => {
                filterTheList(searchWidget.searchTerm);
            });
            
            // 3. Prevent the widget from doing its own thing on "Search"
            searchWidget.on("search-start", (event) => {
                // We stop the search from zooming the map automatically
                // and just use the term to filter our list.
                filterTheList(searchWidget.searchTerm);
            });

            privateLayer.load().then(buildList);
        });
    </script>
</body>
</html>
