<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Custom Dashboard Filter Search</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.28/"></script>

    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        #searchDiv {
            width: 100%;
            padding: 2px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        .esri-search {
            width: 100%;
            box-shadow: none;
            border: 1px solid #ccc;
        }
        #listContainer {
            margin-top: 5px;
            width: 100%;
        }
        .list-item {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
            color: #323232;
            transition: background 0.2s;
        }
        .list-item:hover {
            background-color: #f3f3f3;
            color: #005e95;
        }
    </style>
</head>
<body>
    <div id="searchDiv"></div>
    <div id="listContainer"></div>

    <script>
        require([
            "esri/widgets/Search",
            "esri/layers/FeatureLayer"
        ], (Search, FeatureLayer) => {

            // 1. Define Layer
            const privateLayer = new FeatureLayer({
                portalItem: {
                    id: "a215e921fa0d4b3f88c40210c0a9eee7"
                }
            });

            // 2. Initialize Search Widget as a Filter Input
            const searchWidget = new Search({
                container: "searchDiv",
                includeDefaultSources: false,
                popupEnabled: false, // Disables the map popup
                resultGraphicEnabled: false, // Disables the selection graphic
                activeSourceIndex: 0,
                sources: [{
                    layer: privateLayer,
                    searchFields: ["Name", "Building_T", "Official_Long", "Abbrev_Short"],
                    displayField: "Name",
                    exactMatch: false,
                    outFields: ["*"],
                    name: "Internal Assets",
                    placeholder: "Type to filter list..."
                }]
            });

            // 3. Build the Alphabetical List
            const buildList = () => {
                const query = privateLayer.createQuery();
                query.outFields = ["Name", "objectid"];
                query.where = "1=1";

                privateLayer.queryFeatures(query).then((results) => {
                    const container = document.getElementById("listContainer");
                    
                    const sortedFeatures = results.features.sort((a, b) => {
                        const nameA = (a.attributes.Name || "").toUpperCase();
                        const nameB = (b.attributes.Name || "").toUpperCase();
                        return nameA.localeCompare(nameB);
                    });

                    sortedFeatures.forEach((feature) => {
                        const attr = feature.attributes;
                        const item = document.createElement("div");
                        item.className = "list-item";
                        item.innerText = attr.Name || "Unnamed Asset";

                        // Handle item click to update Dashboard
                        item.onclick = () => {
                            const searchID = attr.objectid;
                            const parentUrl = new URL(window.parent.location.href);
                            parentUrl.searchParams.set('asset', searchID);
                            window.parent.location.replace(parentUrl.href);
                        };

                        container.appendChild(item);
                    });
                });
            };

            // 4. Filter Logic: Listen to search bar typing
            searchWidget.on("value-change", (event) => {
                const filterText = (event.value || "").toLowerCase();
                const listItems = document.querySelectorAll(".list-item");

                listItems.forEach((item) => {
                    const text = item.innerText.toLowerCase();
                    // If the item name contains the typed text, show it; otherwise hide it.
                    if (text.includes(filterText)) {
                        item.style.display = "block";
                    } else {
                        item.style.display = "none";
                    }
                });
            });

            // Load layer and build list
            privateLayer.load().then(buildList);
        });
    </script>
</body>
</html>
