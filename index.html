<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>Custom Dashboard Filter Search</title>

    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css" />
    <script src="https://js.arcgis.com/4.28/"></script>

    <style>
        html, body {
            padding: 0;
            margin: 0;
            width: 100%;
            height: 100%;
            background-color: transparent;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
        #searchDiv {
            width: 100%;
            padding: 2px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        .esri-search__suggestions-menu {
            display: none !important;
        }
        .esri-search {
            width: 100%;
            box-shadow: none;
            border: 1px solid #ccc;
        }
        #listContainer {
            margin-top: 5px;
            width: 100%;
        }
        .list-item {
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            font-size: 14px;
            color: #323232;
            transition: background 0.2s;
        }
        .list-item:hover {
            background-color: #f3f3f3;
            color: #005e95;
        }
    </style>
</head>
<body>
    <div id="searchDiv"></div>
    <div id="listContainer"></div>

    <script>
        require([
            "esri/widgets/Search",
            "esri/layers/FeatureLayer"
        ], (Search, FeatureLayer) => {

            const privateLayer = new FeatureLayer({
                portalItem: {
                    id: "877e842b582840228028c83e6793522a"
                }
            });

            const searchWidget = new Search({
                container: "searchDiv",
                includeDefaultSources: false,
                popupEnabled: false,
                resultGraphicEnabled: false,
                suggestionsEnabled: false, 
                autoSelect: false,          
                sources: [{
                    layer: privateLayer,
                    searchFields: ["Abbrv_Name", "Asset_Name", "Bld_Type"],
                    displayField: "Abbrv_Name",
                    exactMatch: false,
                    outFields: ["*"],
                    name: "Internal Assets",
                    placeholder: "Search for a feature..."
                }]
            });

            const filterTheList = (value) => {
                const filterText = (value || "").toLowerCase();
                const listItems = document.querySelectorAll(".list-item");

                listItems.forEach((item) => {
                    const text = item.innerText.toLowerCase();
                    item.style.display = text.includes(filterText) ? "block" : "none";
                });
            };

            const buildList = () => {
                const query = privateLayer.createQuery();
                query.outFields = ["Abbrv_Name", "OBJECTID"];
                query.where = "1=1";

                privateLayer.queryFeatures(query).then((results) => {
                    const container = document.getElementById("listContainer");
                    container.innerHTML = ""; 
                    
                    const sortedFeatures = results.features.sort((a, b) => {
                        const nameA = (a.attributes.Abbrv_Name || "").toUpperCase();
                        const nameB = (b.attributes.Abbrv_Name || "").toUpperCase();
                        return nameA.localeCompare(nameB);
                    });

                    sortedFeatures.forEach((feature) => {
                        const attr = feature.attributes;
                        const item = document.createElement("div");
                        item.className = "list-item";
                        item.innerText = attr.Abbrv_Name || "Unnamed Asset";

                        // UPDATED ONCLICK LOGIC
                        item.onclick = () => {
                            const searchID = attr.OBJECTID || attr.objectid;
                            
                            if (searchID && document.referrer) {
                                try {
                                    // Construct the new URL using the referrer (the Dashboard URL)
                                    const dashboardUrl = new URL(document.referrer);
                                    dashboardUrl.searchParams.set('asset', searchID);
                                    
                                    // Redirect the parent window to the new URL
                                    window.parent.location.replace(dashboardUrl.href);
                                } catch (e) {
                                    console.error("URL Parsing Error:", e);
                                }
                            } else {
                                console.error("Missing ID or Referrer. ID:", searchID);
                            }
                        };
                        container.appendChild(item);
                    });
                });
            };

            searchWidget.on("post", () => {
                const input = document.querySelector(".esri-search__input");
                if (input) {
                    input.addEventListener("input", (e) => {
                        filterTheList(e.target.value);
                    });
                }
            });

            searchWidget.on("search-complete", () => {
                filterTheList(searchWidget.searchTerm);
            });
            
            searchWidget.on("search-start", (event) => {
                filterTheList(searchWidget.searchTerm);
            });

            privateLayer.load().then(buildList);
        });
    </script>
</body>
</html>
